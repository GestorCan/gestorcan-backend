<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Configuración Residencia TEST </title>

<style>
body{
    margin:0;
    padding:30px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

h1,h2{
    margin-bottom:25px;
}

.card{
    background:#111827;
    border-radius:18px;
    padding:24px;
    max-width:1000px;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.campo{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-size:14px;
    color:#cbd5e1;
}

input, select{
    background:#1e293b;
    border:none;
    border-radius:12px;
    padding:14px;
    color:white;
    font-size:15px;
}

button{
    margin-top:20px;
    background:#2563eb;
    border:none;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.logo-preview{
    margin-top:14px;
    width:120px;
    height:120px;
    object-fit:contain;
    background:white;
    border-radius:14px;
    padding:10px;
}

.habitacion-item{
    background:#1e293b;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.acciones{
    display:flex;
    gap:8px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-card{
    background:#111827;
    padding:28px;
    border-radius:18px;
    width:520px;
    max-width:95%;
}
</style>
</head>

<body>

<h1>Configuración Residencia</h1>

<div class="card">
    <h2>Datos generales</h2>

    <div class="grid">
        <div class="campo">
            <label>Nombre</label>
            <input id="nombre">
        </div>

        <div class="campo">
            <label>Razón Social</label>
            <input id="razon_social">
        </div>

        <div class="campo">
            <label>CIF</label>
            <input id="cif">
        </div>

        <div class="campo">
            <label>Dirección</label>
            <input id="direccion">
        </div>

        <div class="campo">
            <label>Teléfono</label>
            <input id="telefono">
        </div>

        <div class="campo">
            <label>Email</label>
            <input id="email">
        </div>

        <div class="campo">
            <label>Web</label>
            <input id="web">
        </div>

        <div class="campo">
            <label>IVA defecto</label>
            <input id="iva_defecto" type="number">
        </div>

        <div class="campo">
            <label>Serie facturación</label>
            <input id="serie_facturacion">
        </div>

        <div class="campo">
            <label>Hora Check-In</label>
            <input id="hora_checkin">
        </div>

        <div class="campo">
            <label>Hora Check-Out</label>
            <input id="hora_checkout">
        </div>

        <div class="campo">
    <label>Logo</label>

    <input
        id="logo_file"
        type="file"
        accept="image/*"
    >

    <input
        id="logo_url"
        type="hidden"
    >

    <img
        id="logoPreview"
        class="logo-preview"
        style="display:none;"
    >
        </div>

    <button onclick="guardar()">
        Guardar Configuración
    </button>
</div>


<div class="card">
    <h2>Gestión Habitaciones</h2>

    <div class="grid">
        <div class="campo">
            <label>Grupo</label>
            <select id="grupoHabitacion">
                <option value="pequeña">Pequeña</option>
                <option value="mediana">Mediana</option>
                <option value="grande">Grande</option>
            </select>
        </div>

        <div class="campo">
            <label>Cantidad</label>
            <input id="cantidadHabitaciones" type="number" value="5">
        </div>

        <div class="campo">
            <label>Prefijo</label>
            <input id="prefijoHabitacion" value="P">
        </div>

        <div class="campo">
            <label>Capacidad</label>
            <input id="capacidadHabitacion" type="number" value="1">
        </div>
    </div>

    <button onclick="generarHabitaciones()">
        Generar Habitaciones
    </button>

    <div id="resultadoGeneracion" style="margin-top:20px;"></div>
</div>


<div class="card">
    <h2>Listado Habitaciones</h2>
    <div id="listadoHabitaciones">Cargando habitaciones...</div>

</div>


<div id="modalHabitacion" class="modal">
    <div class="modal-card">
        <h2>Editar Habitación</h2>

        <div class="grid">
            <div class="campo">
                <label>Nombre</label>
                <input id="edit_nombre">
            </div>

            <div class="campo">
                <label>Grupo</label>
                <select id="edit_grupo">
                    <option value="pequeña">Pequeña</option>
                    <option value="mediana">Mediana</option>
                    <option value="grande">Grande</option>
                </select>
            </div>


            <div class="campo">
                <label>Capacidad</label>
                <input id="edit_capacidad" type="number">
            </div>

            <div class="campo">
                <label>Estado</label>
                <select id="edit_estado">
                    <option value="libre">Libre</option>
                    <option value="ocupada">Ocupada</option>
                    <option value="parcial">Parcial</option>
                    <option value="limpieza">Limpieza</option>
                    <option value="mantenimiento">Mantenimiento</option>
                    <option value="bloqueada">Bloqueada</option>
                </select>
            </div>
            <div class="campo">

    <label>Permite Cámara</label>

    <select id="edit_permite_camara">

        <option value="true">
            Sí
        </option>

        <option value="false">
            No
        </option>

    </select>

</div>

<div class="campo">

    <label>Permite Compartir</label>

    <select id="edit_permite_compartir">

        <option value="true">
            Sí
        </option>

        <option value="false">
            No
        </option>

    </select>

</div>

<div class="campo" style="grid-column:1/-1;">

    <label>Observaciones</label>

    <input id="edit_observaciones">

</div>

<div class="campo">

    <label>Activa</label>

    <select id="edit_activa">

        <option value="true">
            Sí
        </option>

        <option value="false">
            No
        </option>

    </select>

</div>
        </div>

        <button onclick="guardarEdicionHabitacion()">
            Guardar
        </button>

        <button onclick="cerrarModalHabitacion()" style="background:#475569;">
            Cancelar
        </button>
    </div>
</div>


<script>
let habitacionEditando = null;
const residenciaId = 1;

async function cargar(){
    const response = await fetch(`/residencias/${residenciaId}`);
    const data = await response.json();

    for(const key in data){
        const input = document.getElementById(key);

        if(input){
            input.value = data[key] || "";
        }
    }

    actualizarLogo();
}

function actualizarLogo(){
    const logo = document.getElementById("logo_url").value;
    const preview = document.getElementById("logoPreview");

    if(logo){
        preview.src = logo;
        preview.style.display = "block";
    }else{
        preview.style.display = "none";
    }
}

document.getElementById("logo_url").addEventListener("input", actualizarLogo);

document.getElementById("logo_file").addEventListener("change", function(){
    const file = this.files[0];

    if(!file){
        return;
    }

    const preview = document.getElementById("logoPreview");

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
});

async function guardar(){
    const fileInput = document.getElementById("logo_file");

    if(fileInput.files.length > 0){
        const formData = new FormData();

        formData.append(
            "logo",
            fileInput.files[0]
        );

        const uploadResponse = await fetch(
            `/residencias/${residenciaId}/logo`,
            {
                method:"POST",
                body:formData
            }
        );

        const uploadData = await uploadResponse.json();

        document.getElementById("logo_url").value = uploadData.logo_url;
    }

    const body = {
        nombre: document.getElementById("nombre").value,
        razon_social: document.getElementById("razon_social").value,
        cif: document.getElementById("cif").value,
        direccion: document.getElementById("direccion").value,
        telefono: document.getElementById("telefono").value,
        email: document.getElementById("email").value,
        web: document.getElementById("web").value,
        iva_defecto: parseFloat(document.getElementById("iva_defecto").value || 21),
        serie_facturacion: document.getElementById("serie_facturacion").value,
        hora_checkin: document.getElementById("hora_checkin").value,
        hora_checkout: document.getElementById("hora_checkout").value,
        logo_url: document.getElementById("logo_url").value
    };

    const response = await fetch(`/residencias/${residenciaId}`, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(body)
    });

    alert(response.ok ? "Configuración guardada" : "Error guardando");
}

async function generarHabitaciones(){
    const body = {
        grupo: document.getElementById("grupoHabitacion").value,
        cantidad: parseInt(document.getElementById("cantidadHabitaciones").value),
        prefijo: document.getElementById("prefijoHabitacion").value,
        capacidad: parseInt(document.getElementById("capacidadHabitacion").value),
        permite_camara:true,
        permite_compartir:true
    };

    const response = await fetch(
        `/habitaciones/residencia/${residenciaId}/generar`,
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(body)
        }
    );

    const data = await response.json();

    document.getElementById("resultadoGeneracion").innerHTML =
        `<b>Habitaciones creadas: ${data.creadas}</b>`;

    cargarHabitaciones();
}

async function cargarHabitaciones(){
    const contenedor = document.getElementById("listadoHabitaciones");

    try{
        const response = await fetch("/habitaciones/dashboard/grupos");
        const data = await response.json();

        let html = "";

        for(const grupo in data){
            html += `
                <h3 style="
                    margin-top:30px;
                    margin-bottom:15px;
                    color:#93c5fd;
                ">
                    ${grupo.toUpperCase()}
                </h3>
            `;

            data[grupo].forEach(h=>{
                html += `
                    <div class="habitacion-item">
                        <div>
                            <b style="font-size:18px;">
                                ${h.nombre}
                            </b>

                            <br>

                            <small style="color:#cbd5e1;">
                                ${h.texto_capacidad}
                                ·
                                ${h.texto_estado}
                            </small>
                        </div>

                        <div class="acciones">
                            <button onclick="editarHabitacion(${h.id})">
                                Editar
                            </button>

                            <button
                                onclick="abrirPlanning(${h.id})"
                                style="background:#0f766e;"
                            >
                                Planning
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        contenedor.innerHTML = html;

    }catch(error){
        console.error(error);

        contenedor.innerHTML = `
            <p style="color:#f87171;">
                Error cargando habitaciones
            </p>
        `;
    }
}

async function editarHabitacion(id){
    const response = await fetch(`/habitaciones/${id}`);
    const h = await response.json();

    habitacionEditando = id;

    document.getElementById("edit_nombre").value = h.nombre;
    document.getElementById("edit_grupo").value = h.grupo;
    document.getElementById("edit_capacidad").value = h.capacidad;
    document.getElementById("edit_estado").value = h.estado;

    document.getElementById("edit_permite_camara").value =
        String(h.permite_camara);

    document.getElementById("edit_permite_compartir").value =
        String(h.permite_compartir);

    document.getElementById("edit_observaciones").value =
        h.observaciones || "";

    document.getElementById("edit_activa").value =
        String(h.activa);

    document.getElementById("modalHabitacion").style.display = "flex";
}

function cerrarModalHabitacion(){
    document.getElementById("modalHabitacion").style.display = "none";
}

async function guardarEdicionHabitacion(){
    const body = {
        nombre: document.getElementById("edit_nombre").value,
        grupo: document.getElementById("edit_grupo").value,
        capacidad: parseInt(document.getElementById("edit_capacidad").value),
        estado: document.getElementById("edit_estado").value,

        permite_camara:
            document.getElementById("edit_permite_camara").value === "true",

        permite_compartir:
            document.getElementById("edit_permite_compartir").value === "true",

        observaciones:
            document.getElementById("edit_observaciones").value,

        activa:
            document.getElementById("edit_activa").value === "true"
    };

    const response = await fetch(`/habitaciones/${habitacionEditando}`, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(body)
    });

    if(response.ok){
        cerrarModalHabitacion();
        cargarHabitaciones();
    }else{
        alert("Error actualizando habitación");
    }
}

function abrirPlanning(id){
    window.open("/planning-barras", "_blank");
}

cargar();
cargarHabitaciones();
</script>

</body>

</html>
