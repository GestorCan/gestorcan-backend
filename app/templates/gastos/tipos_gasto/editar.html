{% extends "base.html" %}

{% block content %}

<section class="hero">
    <div>
        <span class="eyebrow">GASTOS</span>
        <h1>Editar tipo de gasto</h1>
        <p>Modifica una categoría de gasto y su IVA habitual.</p>
    </div>
</section>

<section class="panel">

    <form method="post">

        <div class="form-grid">
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text"
                       name="nombre"
                        value="{{ tipo.nombre }}"
                       required
                       placeholder="Ej. Combustible, Pienso, Limpieza...">
            </div>

            <div class="form-group">
                <label>IVA defecto (%)</label>
                <input type="number"
                       step="0.01"
                       name="iva_defecto"
                       value="{{ tipo.iva_defecto }}">

            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">
                Guardar tipo
            </button>

            <a href="/gastos/tipos" class="btn-secondary">
                Cancelar
            </a>
        </div>

    </form>

</section>

<style>
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
}

.form-group label {
    font-size: 0.85rem;
    font-weight: 800;
    color: #374151;
}

.form-group input {
    padding: 0.8rem 0.9rem;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    font-size: 0.95rem;
}

.form-actions {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.75rem;
}
</style>

{% endblock %}
