{% extends "base.html" %}

{% block content %}

<section class="hero">
    <div>
        <span class="eyebrow">FISCAL</span>
        <h1>Paquete asesor</h1>
        <p>Generación automática de documentación trimestral para asesoría.</p>
    </div>
</section>

<section class="panel">

    <form method="post"
          action="/fiscal/paquete-asesor/generar"
          class="filters-grid">

        <div class="form-group">
            <label>Ejercicio</label>
            <input type="number"
                   name="ejercicio"
                   value="{{ ejercicio_actual }}"
                   required>
        </div>

        <div class="form-group">
            <label>Trimestre</label>
            <select name="trimestre" required>
                <option value="1">1T</option>
                <option value="2">2T</option>
                <option value="3">3T</option>
                <option value="4">4T</option>
            </select>
        </div>

        <div class="filter-actions">
            <button type="submit" class="btn-primary">
                Generar paquete
            </button>

            <a href="/fiscal" class="btn-secondary">
                Volver
            </a>
        </div>

    </form>

</section>

<style>
.filters-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1rem;
    align-items: end;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
}

.form-group label {
    font-size: 0.85rem;
    font-weight: 800;
    color: #374151;
}

.form-group input,
.form-group select {
    padding: 0.75rem 0.85rem;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    font-size: 0.95rem;
    background: white;
}

.filter-actions {
    display: flex;
    gap: 0.5rem;
}

@media (max-width: 800px) {
    .filters-grid {
        grid-template-columns: 1fr;
    }
}
</style>

{% endblock %}
