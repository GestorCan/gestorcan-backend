{% extends "base.html" %}

{% block content %}

<section class="hero">
    <div>
        <span class="eyebrow">Analytics</span>
        <h2>Razas y tamaños</h2>
        <p>Estadísticas agrupadas por raza.</p>
    </div>
</section>

<section class="panel">

    <table class="table-modern" id="tablaRazas">

        <thead>
            <tr>
                <th data-sort="raza">Raza</th>
                <th data-sort="tamano">Tamaño</th>
                <th data-sort="mascotas">Mascotas</th>
                <th data-sort="estancias">Estancias</th>
                <th data-sort="dias">Días</th>
                <th data-sort="importe">Total gastado</th>
                <th data-sort="camaras">Cámaras €</th>
                <th data-sort="transporte">Transporte €</th>
                <th data-sort="veterinario">Veterinario €</th>
                <th data-sort="comp_personas">Comp. personas</th>
                <th data-sort="comp_perros">Comp. perros</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

</section>

<script>

let razasData = [];
let sortCampo = "importe";
let sortAsc = false;

function renderTabla() {

    const tbody = document.querySelector("#tablaRazas tbody");

    tbody.innerHTML = "";

    razasData.forEach(r => {

        tbody.innerHTML += `
            <tr>
                <td>${r.raza}</td>
                <td>${r.tamano}</td>
                <td>${r.mascotas}</td>
                <td>${r.estancias}</td>
                <td>${r.dias}</td>
                <td>${r.importe.toFixed(2)} €</td>
                <td>${r.camaras.toFixed(2)} €</td>
                <td>${r.transporte.toFixed(2)} €</td>
                <td>${r.veterinario.toFixed(2)} €</td>
                <td>${r.comp_personas}</td>
                <td>${r.comp_perros}</td>
            </tr>
        `;
    });
}

function ordenarPor(campo) {

    if (sortCampo === campo) {
        sortAsc = !sortAsc;
    } else {
        sortCampo = campo;
        sortAsc = true;
    }

    razasData.sort((a, b) => {

        let valorA = a[campo];
        let valorB = b[campo];

        if (typeof valorA === "string") {
            valorA = valorA.toLowerCase();
            valorB = valorB.toLowerCase();
        }

        if (valorA < valorB) return sortAsc ? -1 : 1;
        if (valorA > valorB) return sortAsc ? 1 : -1;

        return 0;
    });

    renderTabla();
}

async function cargarRazas() {

    const response = await fetch("/api/razas-estadisticas");

    razasData = await response.json();

    ordenarPor("importe");

    document.querySelectorAll("#tablaRazas th").forEach(th => {

        th.addEventListener("click", () => {
            ordenarPor(th.dataset.sort);
        });
    });
}

cargarRazas();

</script>

{% endblock %}
